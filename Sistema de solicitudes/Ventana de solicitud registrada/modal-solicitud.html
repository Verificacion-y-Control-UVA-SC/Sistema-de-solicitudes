<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solicitud Registrada</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="modal-solicitud.css">
</head>
<body>

    <!-- Botón de demostración para abrir el modal -->
    <button class="btn-abrir-modal" id="btnAbrirModal">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 5v14M5 12h14"/>
        </svg>
        Registrar Solicitud
    </button>

    <!-- Overlay + Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal">
            <!-- Barra de progreso animada -->
            <div class="modal-progress-bar"></div>

            <!-- Header -->
            <div class="modal-header">
                <div class="modal-header-titulo">
                    <span class="icono-check">
                        <svg viewBox="0 0 24 24">
                            <path class="check-path" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/>
                        </svg>
                        <span class="check-ring"></span>
                    </span>
                    Solicitud registrada
                </div>
                <button class="btn-cerrar-x" id="btnCerrarX" aria-label="Cerrar">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>

            <!-- Body -->
            <div class="modal-body">
                <div class="success-icon-container">
                    <div class="success-circle">
                        <svg class="success-svg" viewBox="0 0 52 52">
                            <circle class="success-circle-bg" cx="26" cy="26" r="24"/>
                            <path class="success-check" fill="none" d="M14 27l7 7 16-16"/>
                        </svg>
                    </div>
                </div>
                <p class="folio-texto">Folio 002414 generado</p>
                <p class="operacion-texto">La operación se ejecutó</p>
            </div>

            <!-- Footer -->
            <div class="modal-footer">
                <button class="btn-cerrar" id="btnCerrar">
                    Cerrar
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                        <path d="M18 6L6 18M6 6l12 12"/>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script src="modal-solicitud.js"></script>
</body>
</html>
